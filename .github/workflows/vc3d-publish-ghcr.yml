name: Publish builder images (ghcr.io)

# Publishes the volume-cartographer CI builder images (Ubuntu base +
# all apt deps) to ghcr.io so PR CI can `docker pull` them instead of
# rebuilding from scratch each time. Triggered only when the relevant
# Dockerfile / ci.sh changes land on main.
#
# Image:  ghcr.io/<owner>/villa/volume-cartographer
# Tags:   builder-ubuntu-24.04, builder-ubuntu-26.04
#         (plus a sha suffix for traceability)

on:
  push:
    branches: [main]
    paths:
      - 'volume-cartographer/*.Dockerfile'
      - 'volume-cartographer/.dockerignore'
      - 'volume-cartographer/scripts/ci.sh'
      - '.github/workflows/vc3d-publish-ghcr.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.image }} builder
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.image }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: ubuntu-24.04, dockerfile: ubuntu-24.04-noble.Dockerfile }
          - { image: ubuntu-26.04, dockerfile: ubuntu-26.04.Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push builder image
        run: volume-cartographer/scripts/ci.sh publish ${{ matrix.image }}
