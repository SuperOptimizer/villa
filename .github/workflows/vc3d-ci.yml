name: Continuous Integration (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
      dockerfile: ${{ steps.filter.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'
              - '.github/workflows/vc3d-ci.yml'
            dockerfile:
              - 'volume-cartographer/Dockerfile'
              - 'volume-cartographer/.dockerignore'
              - 'volume-cartographer/scripts/ci.sh'
              - 'volume-cartographer/scripts/install_build_deps.sh'

  skip:
    name: Skip (no volume-cartographer changes)
    needs: changes
    if: needs.changes.outputs.vc != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: echo "No volume-cartographer changes — skipping build."

  build-test:
    name: ${{ matrix.action }}-${{ matrix.preset }}-${{ matrix.compiler }} (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: ${{ matrix.blocking != true }}
    strategy:
      fail-fast: false
      # ubuntu-26.04: Release compile + full test + sanitizer matrix
      # + coverage + dead-code.
      matrix:
        include:
          - { image: "ubuntu-26.04", compiler: gcc,   preset: ci-release,    action: compile, blocking: true }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-release,    action: compile, blocking: true }
          - { image: "ubuntu-26.04", compiler: gcc,   preset: ci-tests,      action: test,    blocking: false }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-tests,      action: test,    blocking: false }
          # Sanitizer cells are clang-only — clang's runtime is more
          # complete (TySan, NSan) and we don't need duplicate gcc coverage.
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-asan-ubsan, action: test,    blocking: false }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-tsan,       action: test,    blocking: false }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-tysan,      action: test,    blocking: false }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-nsan,       action: test,    blocking: false }
    env:
      VC_BUILDER_FORCE_LOCAL: ${{ needs.changes.outputs.dockerfile == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Pull or build builder image
        run: volume-cartographer/scripts/ci.sh builder ${{ matrix.image }}
      - name: ${{ matrix.action }}
        run: volume-cartographer/scripts/ci.sh ${{ matrix.action }} ${{ matrix.image }} ${{ matrix.compiler }} ${{ matrix.preset }}

  coverage:
    name: Coverage (clang, source-based)
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: true
    env:
      VC_BUILDER_FORCE_LOCAL: ${{ needs.changes.outputs.dockerfile == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Coverage builds are huge: clang source-based instrumentation
      # (-fprofile-instr-generate -fcoverage-mapping) on every test
      # executable linked statically against vc_core. The default
      # ubuntu runner ships ~14 GB free, which is not enough — `ar` and
      # the final link step hit ENOSPC intermittently. Free ~25-30 GB by
      # purging preinstalled toolchains we don't use (Android SDK, .NET,
      # Haskell, hosted-tool caches).
      - name: Free disk space on runner
        run: |
          set -x
          df -h /
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /opt/hostedtoolcache \
                      /usr/local/share/boost \
                      /usr/local/share/powershell \
                      /usr/local/lib/node_modules \
                      /usr/share/swift
          sudo apt-get -y clean
          docker image prune -af || true
          df -h /
      - uses: docker/setup-buildx-action@v3
      - name: Pull or build builder image
        run: volume-cartographer/scripts/ci.sh builder ubuntu-26.04
      - name: Run coverage
        run: volume-cartographer/scripts/ci.sh coverage ubuntu-26.04
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: volume-cartographer/coverage/
      - name: Print coverage summary
        run: |
          {
            echo "## Total coverage"
            echo '```'
            cat volume-cartographer/coverage/summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Patch coverage gate (vs base branch)
        if: github.event_name == 'pull_request'
        env:
          PATCH_COVERAGE_MIN: '0'
        run: |
          volume-cartographer/scripts/ci.sh patch-coverage origin/${{ github.base_ref }} ubuntu-26.04
          {
            echo "## Patch coverage (vs ${{ github.base_ref }}, gate ≥ ${PATCH_COVERAGE_MIN}%)"
            cat volume-cartographer/coverage/patch.md
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Total coverage non-regression vs base branch
        if: github.event_name == 'pull_request'
        run: volume-cartographer/scripts/ci.sh coverage-regression origin/${{ github.base_ref }} ubuntu-26.04

  # macOS compile is a hard gate (parity with the ubuntu ci-release cells).
  # Smoke + toolchain-verifier run in a separate job that is non-blocking for
  # now; promote that to a gate once it's been stable for a while.
  macos-build:
    name: macOS compile (${{ matrix.os }}, Homebrew LLVM)
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    steps:
      - uses: actions/checkout@v4

      # Cache the Homebrew downloads (bottle tarballs + API index). The
      # install of qt/opencv/ceres/llvm/etc. is the dominant cost — caching
      # downloads keeps the second run under ~10 min.
      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ matrix.os }}-${{ hashFiles('volume-cartographer/scripts/build_macos.sh') }}
          restore-keys: |
            brew-${{ matrix.os }}-

      - name: brew update
        run: brew update

      - name: Configure + build (installs Homebrew deps as needed)
        run: volume-cartographer/scripts/build_macos.sh --install-deps

  dead-code:
    name: Dead-code report (clang, nm + --print-gc-sections)
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: true
    env:
      VC_BUILDER_FORCE_LOCAL: ${{ needs.changes.outputs.dockerfile == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Pull or build builder image
        run: volume-cartographer/scripts/ci.sh builder ubuntu-26.04
      - name: Run dead-code analysis
        run: volume-cartographer/scripts/ci.sh dead-code ubuntu-26.04 clang
      - uses: actions/upload-artifact@v4
        with:
          name: dead-code
          path: volume-cartographer/dead-code/
      - name: Step summary
        run: |
          {
            echo "## Dead-code report"
            echo '```'
            cat volume-cartographer/dead-code/summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  ci:
    name: CI
    needs: [changes, skip, build-test, coverage, macos-build, dead-code]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Aggregate required-check result
        env:
          R_CHANGES: ${{ needs.changes.result }}
          R_SKIP: ${{ needs.skip.result }}
          R_BUILD_TEST: ${{ needs.build-test.result }}
          R_COVERAGE: ${{ needs.coverage.result }}
          R_MACOS: ${{ needs.macos-build.result }}
          R_DEAD_CODE: ${{ needs.dead-code.result }}
        run: |
          set -e
          echo "changes=$R_CHANGES skip=$R_SKIP build-test=$R_BUILD_TEST coverage=$R_COVERAGE macos=$R_MACOS dead-code=$R_DEAD_CODE"
          # coverage and dead-code are continue-on-error, so accept any result.
          # All other non-skipped jobs must succeed (or be skipped legitimately).
          fail=0
          for r in "$R_CHANGES" "$R_SKIP" "$R_BUILD_TEST" "$R_MACOS"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
